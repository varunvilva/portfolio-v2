<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>%SITE_TITLE%</title>
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <meta name="keywords" content="%SITE_KEYWORDS%" />
    <meta name="author" content="%SITE_AUTHOR%" />

    <!-- Open Graph Meta Tags for Social Media -->
    <meta property="og:title" content="%SITE_OG_TITLE%" />
    <meta property="og:description" content="%SITE_SHORT_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%SITE_URL%" />
    <meta property="og:image" content="/src/assets/favicon.png" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_TWITTER_TITLE%" />
    <meta name="twitter:description" content="%SITE_TWITTER_DESCRIPTION%" />
    <meta name="twitter:image" content="/src/assets/favicon.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="%SITE_URL%" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/src/assets/favicon.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
